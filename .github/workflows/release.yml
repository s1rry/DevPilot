name: Release

# Builds signed-less desktop installers for every OS and attaches them to a
# GitHub Release. Triggered by pushing a version tag like `v0.2.3`, or manually.
#
# One-click install for users: they grab the installer for their OS from the
# Releases page. Publishing a release:
#   1. bump the version in apps/desktop/src-tauri/tauri.conf.json (+ package.json)
#   2. git tag v0.2.3 && git push origin v0.2.3
# The workflow then creates a *draft* release with all bundles; review and
# publish it from the GitHub UI.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Build each macOS arch natively rather than cross-compiling a
          # universal binary: git2/libgit2 links system OpenSSL, which only
          # exists for the runner's own arch, so a universal build fails to
          # find OpenSSL for the other slice. Two native runners avoid that.
          - name: macOS (Apple Silicon)
            os: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
          - name: macOS (Intel)
            os: macos-13
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"
          - name: Linux
            os: ubuntu-22.04
            args: ""
            rust-targets: ""
          - name: Windows
            os: windows-latest
            args: ""
            rust-targets: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl \
            wget file libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional macOS code signing + notarization. Builds stay unsigned
          # until these repository secrets are set; then tauri-action signs and
          # notarizes automatically, removing the Gatekeeper warning. Needs an
          # Apple Developer account. See docs/adr or the release docs for setup.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "DevPilot ${{ github.ref_name }}"
          releaseBody: "Установщики DevPilot. Скачайте файл для своей ОС ниже. См. README для инструкций."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform.args }}
